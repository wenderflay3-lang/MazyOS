<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviço — Teixeira Contabilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="demo-banner">Projeto de demonstração criado pela <strong>WClick IA</strong> — <a href="../../index.html#portfolio">voltar ao portfólio</a></div>

<header>
  <nav class="container nav">
    <a href="index.html" class="logo">Teixeira Contabilidade</a>
    <ul class="nav-links">
      <li><a href="index.html#servicos">Serviços</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#depoimentos">Depoimentos</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
    <a href="contato.html" class="btn">Fale conosco</a>
    <button class="nav-toggle" aria-label="menu">☰</button>
  </nav>
</header>

<section>
  <div class="container" style="max-width:720px;">
    <div class="breadcrumb"><a href="index.html#servicos">Serviços</a> / <span id="breadcrumb-name">Serviço</span></div>
    <div class="service-detail" id="service-detail">
      <p>Carregando serviço...</p>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">© 2026 Teixeira Contabilidade — Site de demonstração produzido por WClick IA</div>
  </div>
</footer>

<script src="nav.js"></script>
<script>
  const SERVICES = {
    'abertura': {
      name: 'Abertura de Empresa',
      desc: 'Cuidamos de toda a burocracia pra você tirar sua empresa do papel sem dor de cabeça.',
      details: ['Definição do enquadramento tributário ideal', 'Registro na Junta Comercial', 'Emissão de CNPJ e alvarás necessários', 'Orientação sobre obrigações desde o primeiro dia']
    },
    'mensal': {
      name: 'Contabilidade Mensal',
      desc: 'Folha de pagamento, impostos e obrigações acessórias em dia, todo mês, sem sustos nem multa por atraso.',
      details: ['Apuração e envio de impostos mensais', 'Folha de pagamento e encargos', 'Obrigações acessórias em dia', 'Relatórios financeiros mensais simplificados']
    },
    'fiscal': {
      name: 'Consultoria Fiscal',
      desc: 'Planejamento tributário pra pagar só o que é devido, dentro da lei, com relatórios simples de entender.',
      details: ['Análise do regime tributário atual', 'Identificação de oportunidades legais de economia', 'Simulação de cenários tributários', 'Relatório com plano de ação']
    }
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const service = SERVICES[id];
  const detailEl = document.getElementById('service-detail');
  const breadcrumbEl = document.getElementById('breadcrumb-name');

  if (service) {
    document.title = service.name + ' — Teixeira Contabilidade';
    breadcrumbEl.textContent = service.name;
    detailEl.innerHTML =
      '<h1>' + service.name + '</h1>' +
      '<p style="color:var(--text-muted); margin-top:16px;">' + service.desc + '</p>' +
      '<ul>' + service.details.map(function (d) { return '<li>' + d + '</li>'; }).join('') + '</ul>' +
      '<a href="contato.html" class="btn">Falar sobre esse serviço</a>';
  } else {
    detailEl.innerHTML = '<p>Serviço não encontrado. <a href="index.html#servicos" style="color:var(--accent); text-decoration:underline;">Voltar aos serviços</a>.</p>';
  }
</script>

</body>
</html>
